<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EC">
<title>Moments</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --paper:#F7F3EC; --card:#FFFDF9; --ink:#221F1A; --muted:#8A8378;
    --line:#E7E0D4; --accent:#2F5D50; --danger:#A4453C;
    --yt:#B33A3A; --sp:#3A7D5C;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:var(--sans)}
  body{padding-bottom:90px}
  header.app{
    position:sticky; top:0; z-index:5; background:linear-gradient(var(--paper) 75%, rgba(247,243,236,0));
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px; display:flex; align-items:baseline; justify-content:space-between;
  }
  header.app h1{font-family:var(--serif); font-size:26px; margin:0; letter-spacing:.3px}
  header.app h1 span{color:var(--muted); font-size:15px; font-family:var(--sans); font-weight:400; margin-left:8px}
  .iconbtn{background:none; border:none; font-size:22px; color:var(--ink); padding:6px 10px; cursor:pointer}
  main{padding:0 16px; max-width:640px; margin:0 auto}

  .search{width:100%; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:11px 14px; font-size:15px; color:var(--ink); margin:2px 0 14px; outline:none}
  .search::placeholder{color:var(--muted)}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 18px 14px;
    margin-bottom:14px; box-shadow:0 1px 3px rgba(60,50,30,.06); cursor:pointer}
  .card .doodle{width:100%; border-radius:10px; margin-bottom:10px; background:#fff; border:1px solid var(--line)}
  .quote{font-family:var(--serif); font-size:19px; line-height:1.45; margin:0; white-space:pre-wrap}

  /* collection (masonry) */
  .collection{columns:2; column-gap:12px; margin-top:2px}
  @media (min-width:540px){ .collection{columns:3; column-gap:14px} }
  .collection .card{break-inside:avoid; -webkit-column-break-inside:avoid; width:100%; margin:0 0 12px;
    padding:14px 14px 12px; display:block; transition:transform .12s ease, box-shadow .12s ease}
  .collection .card:active{transform:scale(.985)}
  .collection .card.hasdraw{padding-top:12px}
  .collection .card .quote{font-size:var(--qs,16px); line-height:1.32}
  .collection .card .doodle{margin-bottom:10px}
  .collection .card .meta{margin-top:10px; font-size:11.5px; gap:6px}
  .quote::before{content:'\201C'; color:var(--muted); margin-right:2px}
  .quote::after{content:'\201D'; color:var(--muted); margin-left:2px}
  .meta{display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13px; color:var(--muted); flex-wrap:wrap}
  .dot{width:8px; height:8px; border-radius:50%; flex:none}
  .dot.youtube{background:var(--yt)} .dot.spotify{background:var(--sp)} .dot.other{background:var(--muted)}
  .meta .title{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%}
  .chip{border:1px solid var(--line); border-radius:999px; padding:2px 9px; font-size:12px; color:var(--ink); background:var(--paper); flex:none}
  .thoughtcount{margin-left:auto; flex:none}

  .empty{ text-align:center; color:var(--muted); padding:48px 20px; line-height:1.7; font-size:15px }
  .empty .big{font-family:var(--serif); font-size:22px; color:var(--ink); margin-bottom:10px}
  .empty ol{text-align:left; display:inline-block; margin:14px 0 0; padding-left:22px}

  .fab{position:fixed; right:20px; bottom:calc(22px + env(safe-area-inset-bottom)); width:58px; height:58px; border-radius:50%;
    background:var(--ink); color:var(--paper); font-size:28px; border:none; box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer; z-index:6}

  /* forms */
  label.f{display:block; font-size:12px; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin:16px 0 6px}
  input.f, textarea.f{width:100%; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:12px 14px; font-size:16px; color:var(--ink); outline:none; font-family:var(--sans)}
  textarea.f{min-height:110px; font-family:var(--serif); font-size:18px; line-height:1.5}
  .row{display:flex; gap:10px; align-items:center}
  .row > *{flex:1}
  button.primary{background:var(--ink); color:var(--paper); border:none; border-radius:12px; padding:14px; font-size:16px;
    width:100%; margin-top:20px; cursor:pointer; font-weight:600}
  button.ghost{background:none; border:1px solid var(--line); border-radius:12px; padding:11px 14px; font-size:14px;
    color:var(--ink); cursor:pointer}
  button.ghost.danger{color:var(--danger); border-color:#E5CFC9}
  .hint{font-size:13px; color:var(--muted); margin-top:8px; line-height:1.5}
  .srcpreview{display:flex; gap:12px; align-items:center; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px; margin-top:6px}
  .srcpreview img{width:52px; height:52px; border-radius:8px; object-fit:cover; flex:none}
  .srcpreview .t{font-size:14px; line-height:1.35}
  .srcpreview .s{font-size:12px; color:var(--muted); margin-top:2px}

  /* detail */
  .back{color:var(--muted); font-size:14px; background:none; border:none; padding:8px 0; cursor:pointer}
  .playbtn{display:flex; align-items:center; justify-content:center; gap:10px; background:var(--accent); color:#fff;
    border:none; border-radius:12px; padding:14px; font-size:16px; width:100%; margin-top:16px; cursor:pointer; font-weight:600; text-decoration:none}
  .actions{display:flex; gap:10px; margin-top:12px}
  /* discrete detail action bar — monochrome SVG icons, same size/stroke/baseline
     (emoji glyphs render in full color on Android regardless of CSS, and each
     one has a different natural size — SVG with currentColor fixes both) */
  .dactions{display:flex; align-items:center; gap:2px; margin-top:16px; flex-wrap:wrap}
  .act{background:none; border:none; color:var(--muted); font-size:13px; padding:8px 10px; border-radius:10px;
    cursor:pointer; display:inline-flex; align-items:center; gap:6px; text-decoration:none; line-height:1}
  .act .ico{width:18px; height:18px; flex:none; display:block}
  .act .ico svg{width:100%; height:100%; display:block; stroke:currentColor; fill:none;
    stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
  .act:hover,.act:active{background:var(--paper); color:var(--ink)}
  .act.spacer{flex:1; pointer-events:none; padding:0}
  .thought{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:10px}
  .thought .when{font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; gap:10px; align-items:center}
  .thought .when a{color:var(--accent); text-decoration:none; font-weight:600}
  .thought p{margin:0; font-size:15px; line-height:1.5; white-space:pre-wrap}
  h2.sect{font-family:var(--serif); font-size:18px; margin:26px 0 4px}

  /* doodle overlay */
  .overlay{position:fixed; inset:0; background:rgba(34,31,26,.55); z-index:20; display:flex; align-items:center; justify-content:center; padding:14px}
  .sheet{background:var(--card); border-radius:18px; padding:16px; width:100%; max-width:560px}
  .sheet h3{margin:0 0 10px; font-family:var(--serif); font-size:18px}
  #doodleCanvas{width:100%; touch-action:none; border:1px solid var(--line); border-radius:12px; background:#fff; display:block}
  .sheet .row{margin-top:12px}

  /* live transcript */
  .txpanel{border:1px solid var(--line); border-radius:14px; background:var(--card); padding:14px;
    min-height:80px; line-height:2.1; font-family:var(--serif); font-size:17px}
  .txpanel.listening{border-color:var(--danger)}
  .txword{padding:3px 5px; border-radius:6px; cursor:pointer; color:var(--muted)}
  .txword.sel{background:#EBE3D2; color:var(--ink)}
  .txlivetext{color:var(--ink)}
  .cursor{color:var(--danger); animation:blink 1s infinite}
  @keyframes blink{50%{opacity:0}}
  .txbtn{background:var(--ink); color:var(--paper); border:none; border-radius:12px; padding:12px; font-size:15px; font-weight:600; cursor:pointer}
  .txbtn.stop{background:var(--danger)}
  .audiochip{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:8px 12px; margin-top:10px}
  .audiochip audio{flex:1; height:36px; min-width:0}
  .audiochip .rm{border:none; background:none; color:var(--danger); font-size:13px; cursor:pointer; flex:none}
  .langchip{font-size:12px; border:1px solid var(--line); border-radius:999px; padding:4px 12px; background:var(--paper); color:var(--muted); cursor:pointer; flex:none}

  .menu{position:fixed; top:60px; right:16px; background:var(--card); border:1px solid var(--line); border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.12); z-index:15; overflow:hidden}
  .menu button{display:block; width:100%; text-align:left; background:none; border:none; padding:13px 18px; font-size:15px; color:var(--ink); cursor:pointer}
  .menu button:active{background:var(--paper)}
  .toast{position:fixed; bottom:calc(96px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); border-radius:999px; padding:10px 18px; font-size:14px; z-index:30; opacity:0; transition:opacity .25s}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header class="app">
  <h1 id="appTitle">Moments<span id="count"></span></h1>
  <button class="iconbtn" id="menuBtn" title="Menu">&#8942;</button>
</header>
<main id="view"></main>
<button class="fab" id="fab" title="New snippet">+</button>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept="application/json" style="display:none">

<script>
'use strict';
/* ---------- storage ---------- */
const KEY = 'moments.v1';
let db = [];
try { db = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { db = []; }
function persist(){
  try { localStorage.setItem(KEY, JSON.stringify(db)); }
  catch(e){ alert('Storage is full. Export your snippets from the menu, then delete some drawings to free space.'); }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ---------- audio storage (IndexedDB — clips are too big for localStorage) ---------- */
function idb(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('moments-audio', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('audio');
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function audioPut(id, blob){
  const d = await idb();
  return new Promise((res, rej) => {
    const tx = d.transaction('audio', 'readwrite');
    tx.objectStore('audio').put(blob, id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function audioGet(id){
  const d = await idb();
  return new Promise((res, rej) => {
    const rq = d.transaction('audio').objectStore('audio').get(id);
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => rej(rq.error);
  });
}
async function audioDel(id){
  if (!id) return;
  const d = await idb();
  return new Promise(res => {
    const tx = d.transaction('audio', 'readwrite');
    tx.objectStore('audio').delete(id);
    tx.oncomplete = res; tx.onerror = res;
  });
}
function delSnippetAudio(sn){
  if (sn.audio) audioDel(sn.audio.id);
  (sn.thoughts || []).forEach(th => { if (th.audio) audioDel(th.audio.id); });
}

/* ---------- live transcription (speech recognition only — a MediaRecorder would
   hold the mic exclusively, which breaks recognition on Android and fights Spotify) ---------- */
function getLang(){
  return localStorage.getItem('moments.lang') ||
    ((navigator.language || 'en').toLowerCase().startsWith('de') ? 'de-DE' : 'en-US');
}
function toggleLang(){ localStorage.setItem('moments.lang', getLang() === 'de-DE' ? 'en-US' : 'de-DE'); }

function makeListener(opts){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  let rec = null, active = false, finals = '', interim = '';
  // One session only. Restarting recognition in a loop toggles the mic on and off,
  // and Android pauses/resumes media playback with every toggle.
  function finish(){
    if (!active) return;
    active = false;
    // brief delay so the recognizer can flush its final results
    setTimeout(() => opts.onDone(finals, interim), 250);
  }
  return {
    start(){
      if (active) return;
      active = true; finals = ''; interim = '';
      rec = new SR();
      rec.lang = getLang(); rec.continuous = true; rec.interimResults = true;
      rec.onresult = ev => {
        // Rebuild the whole transcript from scratch every event instead of
        // appending. Android Chrome repeatedly reports resultIndex = 0 and
        // re-delivers already-final results, so incremental `finals +=` double-
        // counts them into a growing ladder ("how", "how how is", …). Rebuilding
        // from results[0] each time is idempotent and immune to that.
        let f = '', itm = '';
        for (let i = 0; i < ev.results.length; i++) {
          const r = ev.results[i];
          if (r.isFinal) f += r[0].transcript + ' ';
          else itm += r[0].transcript + ' ';
        }
        finals = f; interim = itm.trim();
        opts.onLive(finals, interim);
      };
      rec.onend = finish; // ended by itself (silence) — that's our Done
      rec.onerror = ev => {
        if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
          active = false;
          opts.onError('Microphone blocked — allow it for this site, or type below.');
        }
      };
      try { rec.start(); } catch(e) { active = false; opts.onError('Could not start listening.'); }
    },
    stop(){
      if (rec) try { rec.stop(); } catch(e) {}
      finish();
    },
    active(){ return active; }
  };
}
function audioChipHtml(elId, removable){
  return `<div class="audiochip"><audio controls id="${elId}"></audio>${removable ? `<button class="rm" id="${elId}-rm">Remove</button>` : ''}</div>`;
}
function loadAudioInto(elId, audioId){
  audioGet(audioId).then(b => { const el = document.getElementById(elId); if (b && el) el.src = URL.createObjectURL(b); });
}

/* ---------- monochrome icon set (all currentColor — no emoji, no per-glyph color/size drift) ---------- */
const ICON = {
  play: '<span class="ico"><svg viewBox="0 0 24 24"><path d="M7 4l13 8-13 8V4z" stroke-linejoin="round"/></svg></span>',
  share: '<span class="ico"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.7l7.4-4.4M8.3 13.3l7.4 4.4"/></svg></span>',
  draw: '<span class="ico"><svg viewBox="0 0 24 24"><path d="M4 20l.9-4L16 4.9a1.5 1.5 0 012.1 0l1 1a1.5 1.5 0 010 2.1L8 17.1 4 20z"/><path d="M14 6.9L17.1 10"/></svg></span>',
  edit: '<span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.6 7.6 0 000-2l2-1.5-2-3.4-2.3.9a7.7 7.7 0 00-1.8-1L15 3.5h-6l-.3 2.5a7.7 7.7 0 00-1.8 1l-2.3-.9-2 3.4L4.6 11a7.6 7.6 0 000 2l-2 1.5 2 3.4 2.3-.9c.5.4 1.2.8 1.8 1l.3 2.5h6l.3-2.5a7.7 7.7 0 001.8-1l2.3.9 2-3.4-2-1.5z"/></svg></span>',
  trash: '<span class="ico"><svg viewBox="0 0 24 24"><path d="M5 7h14M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m2 0-.8 12.1a1.5 1.5 0 01-1.5 1.4H8.3a1.5 1.5 0 01-1.5-1.4L6 7"/><path d="M10 11v6M14 11v6"/></svg></span>'
};

/* ---------- helpers ---------- */
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtTime(sec){
  if (sec == null || isNaN(sec)) return '';
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
  return (h ? h + ':' + String(m).padStart(2,'0') : m) + ':' + String(s).padStart(2,'0');
}
function parsePos(str){
  if (!str) return null;
  str = str.trim();
  if (/^\d+$/.test(str)) return parseInt(str,10);           // plain seconds
  const p = str.split(':').map(Number);
  if (p.some(isNaN)) return null;
  if (p.length === 2) return p[0]*60 + p[1];
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  return null;
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) + ', ' +
         d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- link parsing ---------- */
function parseTimeParam(v){
  if (!v) return null;
  if (/^\d+$/.test(v)) return parseInt(v,10);
  const m = v.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s?)?$/);
  if (!m) return null;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0) || null;
}
function extractUrl(text){
  const m = String(text||'').match(/https?:\/\/[^\s"']+/);
  return m ? m[0].replace(/[).,;]+$/,'') : null;
}
function parseMedia(url){
  let u;
  try { u = new URL(url); } catch(e) { return null; }
  const host = u.hostname.replace(/^www\./,'');
  // YouTube
  if (host === 'youtu.be' || host.endsWith('youtube.com')) {
    let id = null;
    if (host === 'youtu.be') id = u.pathname.split('/').filter(Boolean)[0];
    else {
      id = u.searchParams.get('v');
      if (!id) {
        const seg = u.pathname.split('/').filter(Boolean);
        const i = seg.findIndex(s => ['shorts','live','embed'].includes(s));
        if (i >= 0 && seg[i+1]) id = seg[i+1];
      }
    }
    const t = parseTimeParam(u.searchParams.get('t') || u.searchParams.get('start'));
    if (!id) return { source:'other', url, t:null };
    return { source:'youtube', url, id, t };
  }
  // Spotify
  if (host === 'open.spotify.com') {
    const seg = u.pathname.split('/').filter(s => s && !s.startsWith('intl-'));
    const kinds = ['episode','track','show'];
    if (kinds.includes(seg[0]) && seg[1]) {
      const t = parseTimeParam(u.searchParams.get('t'));
      return { source:'spotify', url, kind:seg[0], id:seg[1], t };
    }
  }
  if (host === 'spotify.link') return { source:'spotify', url, t:null }; // short link, no timestamp readable
  return { source:'other', url, t:null };
}
function jumpUrl(sn, posOverride){
  const t = posOverride != null ? posOverride : sn.t;
  if (sn.source === 'youtube' && sn.mediaId)
    return 'https://youtu.be/' + sn.mediaId + (t != null ? '?t=' + t : '');
  if (sn.source === 'spotify' && sn.mediaId && sn.mediaKind)
    return 'https://open.spotify.com/' + sn.mediaKind + '/' + sn.mediaId + (t != null ? '?t=' + t : '');
  return sn.url;
}
async function fetchMeta(media){
  const endpoints = [];
  if (media.source === 'youtube') endpoints.push('https://www.youtube.com/oembed?format=json&url=' + encodeURIComponent(media.url));
  if (media.source === 'spotify') endpoints.push('https://open.spotify.com/oembed?url=' + encodeURIComponent(media.url));
  endpoints.push('https://noembed.com/embed?url=' + encodeURIComponent(media.url));
  for (const ep of endpoints) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 5000);
      const r = await fetch(ep, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!r.ok) continue;
      const j = await r.json();
      if (j && j.title) return { title: j.title, thumb: j.thumbnail_url || null, podcast: j.author_name || null };
    } catch(e) { /* try next */ }
  }
  return null;
}

/* ---------- share target intake ---------- */
(function(){
  const qs = new URLSearchParams(location.search);
  if (qs.has('s_url') || qs.has('s_text') || qs.has('s_title')) {
    sessionStorage.setItem('pendingShare', JSON.stringify({
      title: qs.get('s_title') || '', text: qs.get('s_text') || '', url: qs.get('s_url') || ''
    }));
    history.replaceState(null, '', location.pathname);
  }
})();

// Shared from Spotify/YouTube → save the moment instantly (no mic, no typing), then
// land on its card where the line can be added later. Keeps the podcast playing.
function consumePendingShare(){
  const pending = JSON.parse(sessionStorage.getItem('pendingShare') || 'null');
  if (!pending) return false;
  sessionStorage.removeItem('pendingShare');
  const url = extractUrl(pending.url) || extractUrl(pending.text) || extractUrl(pending.title) || '';
  const media = url ? parseMedia(url) : null;
  const sn = {
    id: uid(), createdAt: new Date().toISOString(),
    url, source: media ? media.source : 'other',
    mediaId: media && media.id || null, mediaKind: media && media.kind || null,
    title: (pending.title && !extractUrl(pending.title)) ? pending.title : '',
    podcast: null, thumb: null, t: media ? media.t : null, quote: '', doodle: null, audio: null, thoughts: []
  };
  db.push(sn); persist();
  sessionStorage.setItem('autoListenFor', sn.id);   // card auto-starts listening once
  location.hash = '#/s/' + sn.id;
  toast('Moment saved — keep listening.');
  if (media) fetchMeta(media).then(meta => {          // fill title/podcast/thumbnail in the background
    if (!meta) return;
    if (!sn.title) sn.title = meta.title;
    if (!sn.podcast) sn.podcast = meta.podcast;
    sn.thumb = meta.thumb; persist();
    // update in place — a full re-render would wipe an in-progress transcript
    if (location.hash === '#/s/' + sn.id) updateDetailMetaLine(sn);
  });
  return true;
}

/* ---------- routing ---------- */
const view = document.getElementById('view');
function route(){
  closeMenu();
  const h = location.hash || '#/';
  if (h === '#/new') return renderCapture();
  const m = h.match(/^#\/s\/(.+)$/);
  if (m) { const sn = db.find(x => x.id === m[1]); if (sn) return renderDetail(sn); }
  renderHome();
}
window.addEventListener('hashchange', route);
document.getElementById('fab').onclick = () => { sessionStorage.removeItem('pendingShare'); location.hash = '#/new'; };

/* ---------- home ---------- */
let searchQ = '';
function renderHome(){
  document.getElementById('count').textContent = db.length ? '· ' + db.length : '';
  document.getElementById('fab').style.display = 'block';
  if (!db.length) {
    view.innerHTML = `<div class="empty">
      <div class="big">Keep the lines worth keeping.</div>
      While listening in Spotify or YouTube:
      <ol>
        <li>Tap <b>Share</b> (in Spotify choose <b>&ldquo;Share from&rdquo;</b> the current time; in YouTube tick <b>&ldquo;Start at&rdquo;</b>)</li>
        <li>Pick <b>Moments</b> &mdash; the moment is <b>saved instantly</b>, your podcast keeps playing</li>
        <li>Add the line whenever you like: <b>speak it</b> and tap the words, or type &mdash; or just leave it and jump back later</li>
      </ol>
      <div style="margin-top:18px">${installBtnHtml()}</div>
    </div>`;
    bindInstall();
    return;
  }
  const q = searchQ.toLowerCase();
  const items = db
    .filter(sn => !q || (sn.quote + ' ' + sn.title + ' ' + (sn.podcast||'') + ' ' + sn.thoughts.map(t=>t.text).join(' ')).toLowerCase().includes(q))
    .sort((a,b) => b.createdAt.localeCompare(a.createdAt));
  view.innerHTML = `
    <input class="search" id="search" placeholder="Search snippets&hellip;" value="${esc(searchQ)}">
    ${items.length ? `<div class="collection">${items.map(cardHtml).join('')}</div>` : '<div class="empty">No matches.</div>'}`;
  const s = document.getElementById('search');
  s.oninput = () => { searchQ = s.value; renderHome(); document.getElementById('search').focus(); const el = document.getElementById('search'); el.setSelectionRange(el.value.length, el.value.length); };
  items.forEach(sn => { document.getElementById('card-' + sn.id).onclick = () => location.hash = '#/s/' + sn.id; });
}
// length-aware type: short lines read large and punchy, long ones settle down
function quoteSize(len){
  if (len <= 28) return 21;
  if (len <= 55) return 18.5;
  if (len <= 100) return 16;
  if (len <= 170) return 14;
  return 12.5;
}
function cardHtml(sn){
  const q = sn.quote || '';
  const qs = quoteSize(q.length);
  const body = q
    ? `<p class="quote">${esc(q)}</p>`
    : `<p class="quote" style="font-style:italic;color:var(--muted);font-size:15px">${sn.doodle ? 'Sketch' : (sn.audio ? 'Voice note' : 'Saved moment')}</p>`;
  return `<div class="card ${sn.doodle ? 'hasdraw' : ''}" id="card-${sn.id}" style="--qs:${qs}px">
    ${sn.doodle ? `<img class="doodle" src="${sn.doodle}" alt="">` : ''}
    ${body}
    <div class="meta">
      <span class="dot ${sn.source}"></span>
      ${sn.t != null ? `<span class="chip">${fmtTime(sn.t)}</span>` : ''}
      ${sn.audio ? `<span class="chip">&#127908;</span>` : ''}
      ${sn.thoughts.length ? `<span class="thoughtcount">${sn.thoughts.length}&#8202;&#128172;</span>` : ''}
    </div>
  </div>`;
}

/* ---------- reusable line-capture widget (voice → tappable words → quote) ---------- */
function mountLineCapture(root, opts){
  opts = opts || {};
  root.innerHTML = `
    <div class="txpanel" data-tx="panel"><span class="hint">Transcript appears here</span></div>
    <div class="row" style="margin-top:10px">
      <button class="txbtn" data-tx="btn" style="flex:2">&#127908; Start listening</button>
      <button class="ghost" data-tx="all" style="display:none">All</button>
      <button class="langchip" data-tx="lang"></button>
    </div>
    <div class="hint" data-tx="hint"></div>
    <textarea class="f" data-tx="quote" placeholder="The words land here &mdash; edit freely, or just type" style="margin-top:12px">${esc(opts.initialQuote || '')}</textarea>`;
  const panel = root.querySelector('[data-tx=panel]');
  const btn = root.querySelector('[data-tx=btn]');
  const allBtn = root.querySelector('[data-tx=all]');
  const langBtn = root.querySelector('[data-tx=lang]');
  const hint = root.querySelector('[data-tx=hint]');
  const quoteEl = root.querySelector('[data-tx=quote]');

  langBtn.textContent = getLang();
  langBtn.onclick = () => { toggleLang(); langBtn.textContent = getLang(); };

  let words = [], selStart = -1, selEnd = -1, anchor = -1;
  function syncQuote(){
    if (selStart < 0) return;
    quoteEl.value = words.slice(selStart, selEnd + 1).join(' ');
  }
  function renderWords(){
    panel.innerHTML = '';
    words.forEach((w, i) => {
      const s = document.createElement('span');
      s.className = 'txword' + (i >= selStart && i <= selEnd ? ' sel' : '');
      s.textContent = w;
      s.onclick = () => {
        if (anchor < 0) { anchor = i; selStart = selEnd = i; }
        else { selStart = Math.min(anchor, i); selEnd = Math.max(anchor, i); anchor = -1; }
        renderWords(); syncQuote();
      };
      panel.appendChild(s);
      panel.appendChild(document.createTextNode(' '));
    });
    allBtn.style.display = words.length ? 'block' : 'none';
  }
  allBtn.onclick = () => { selStart = 0; selEnd = words.length - 1; anchor = -1; renderWords(); syncQuote(); };

  // best guess: the longest sentence is the line worth keeping — the user adjusts by tapping
  function guessSelection(fullText){
    const sentences = fullText.split(/(?<=[.!?])\s+/).filter(s => s.trim());
    if (sentences.length > 1) {
      const best = sentences.reduce((a, b) => b.split(/\s+/).length > a.split(/\s+/).length ? b : a);
      const before = fullText.slice(0, fullText.indexOf(best)).trim();
      selStart = before ? before.split(/\s+/).length : 0;
      selEnd = Math.min(words.length - 1, selStart + best.trim().split(/\s+/).length - 1);
    } else { selStart = 0; selEnd = words.length - 1; }
  }

  const lst = makeListener({
    onLive: (finals, interim) => {
      panel.innerHTML = '<span class="txlivetext">' + esc((finals + interim).trim()) + '</span> <span class="cursor">&#9612;</span>';
    },
    onDone: (finals, interim) => {
      panel.classList.remove('listening');
      btn.classList.remove('stop');
      btn.innerHTML = '&#127908; Listen again';
      const full = (finals + ' ' + interim).replace(/\s+/g, ' ').trim();
      words = full ? full.split(' ') : [];
      if (!words.length) {
        panel.innerHTML = '<span class="hint">Heard nothing &mdash; get closer to the speaker and try again, or type below.</span>';
        hint.textContent = '';
        return;
      }
      guessSelection(full);
      renderWords(); syncQuote();
      hint.innerHTML = 'The highlighted part becomes the line &mdash; <b>tap the first and last word</b> of the part you want instead.';
    },
    onError: msg => {
      panel.classList.remove('listening');
      btn.classList.remove('stop');
      btn.innerHTML = '&#127908; Start listening';
      panel.innerHTML = '<span class="hint">' + esc(msg) + '</span>';
    }
  });

  function startListening(){
    if (!lst) { hint.textContent = 'Speech recognition is not available in this browser — type below.'; return; }
    words = []; selStart = selEnd = -1; anchor = -1;
    lst.start();
    panel.classList.add('listening');
    panel.innerHTML = '<span class="hint">Listening&hellip;</span>';
    btn.classList.add('stop');
    btn.innerHTML = '&#9632; Done';
    hint.innerHTML = 'Say the line in your own words &mdash; it stops by itself when you pause.';
  }
  btn.onclick = () => { if (lst && lst.active()) lst.stop(); else startListening(); };
  window.addEventListener('hashchange', () => { if (lst && lst.active()) lst.stop(); }, { once: true });
  if (opts.autostart && lst) setTimeout(startListening, 300);

  return {
    getQuote: () => quoteEl.value.trim(),
    isActive: () => !!(lst && lst.active()),
    stop: () => { if (lst && lst.active()) lst.stop(); }
  };
}

/* ---------- capture (manual new / edit) ---------- */
function renderCapture(existing){
  document.getElementById('fab').style.display = 'none';

    url: existing.url, media: { source: existing.source, id: existing.mediaId, kind: existing.mediaKind, url: existing.url, t: existing.t },

  } : { url: sharedUrl || '', media: null, title: pending && pending.title && !extractUrl(pending.title) ? pending.title : '', podcast: '', thumb: null, t: null, quote: '', doodle: null, audio: null };

    <input class="f" id="ts" placeholder="0:00" value="${st.t != null ? fmtTime(st.t) : ''}">
    <label class="f">Drawing <span style="text-transform:none;letter-spacing:0">(optional)</span></label>
    <div class="row">
      <button class="ghost" id="drawBtn">${st.doodle ? 'Edit drawing' : 'Add a small drawing'}</button>
      <button class="ghost danger" id="rmDraw" style="display:${st.doodle ? 'block':'none'}">Remove</button>
    </div>
    <div id="drawPreview">${st.doodle ? `<img class="doodle" style="margin-top:10px;border:1px solid var(--line);border-radius:10px;width:100%" src="${st.doodle}">` : ''}</div>
    <button class="primary" id="save">${existing ? 'Save changes' : 'Save snippet'}</button>

  document.getElementById('back').onclick = () => history.length > 1 ? history.back() : location.hash = '#/';

  async function applyUrl(raw){
    const url = extractUrl(raw);
    if (!url) return;
    const media = parseMedia(url);
    if (!media) return;
    st.url = url; st.media = media;
    if (media.t != null) { st.t = media.t; document.getElementById('ts').value = fmtTime(media.t); }
    renderPreview('Fetching title&hellip;');
    const meta = await fetchMeta(media);
    if (meta) {
      st.title = meta.title; st.thumb = meta.thumb;
      document.getElementById('title').value = meta.title;

    const el = document.getElementById('preview');
    if (!st.media) { el.innerHTML = ''; return; }
    const name = st.media.source === 'youtube' ? 'YouTube' : st.media.source === 'spotify' ? 'Spotify' : 'Link';
    el.innerHTML = `<div class="srcpreview">
      ${st.thumb ? `<img src="${esc(st.thumb)}" alt="">` : ''}

      <div class="s"><span class="dot ${st.media.source}" style="display:inline-block;margin-right:5px"></span>${name}${st.t != null ? ' &middot; ' + fmtTime(st.t) : ''}</div></div>
    </div>`;
  }
  if (!existing) {
    const urlInput = document.getElementById('url');
    urlInput.onchange = () => applyUrl(urlInput.value);
    const pasteBtn = document.getElementById('paste');
    pasteBtn.onclick = async () => {
      try { const txt = await navigator.clipboard.readText(); if (txt) { urlInput.value = txt; applyUrl(txt); } }
      catch(e) { toast('Clipboard not available — paste into the field.'); }
    };
    if (st.url) applyUrl(st.url);
  } else if (st.media) renderPreview();

  document.getElementById('drawBtn').onclick = () => openDoodle(st.doodle, data => {
    st.doodle = data;
    document.getElementById('drawPreview').innerHTML = data ? `<img class="doodle" style="margin-top:10px;border:1px solid var(--line);border-radius:10px;width:100%" src="${data}">` : '';

    document.getElementById('drawBtn').textContent = 'Add a small drawing';

    }

    const sn = {
      id: uid(), createdAt: new Date().toISOString(),
      url: rawUrl, source: media ? media.source : 'other',
      mediaId: media && media.id || null, mediaKind: media && media.kind || null,
      title, podcast, thumb: st.thumb, t, quote, doodle: st.doodle, audio: st.audio, thoughts: []
    };
    db.push(sn); persist();
    location.hash = '#/s/' + sn.id;
    toast('Saved — back to listening!');
  }
  document.getElementById('save').onclick = () => {
    if (cap.isActive()) { cap.stop(); setTimeout(doSave, 500); } else doSave();
  };
}

  document.getElementById('back').onclick = () => location.hash = '#/';

  };
  // drawing straight from the card — persists immediately (no separate Save step)
  document.getElementById('draw').onclick = () => openDoodle(sn.doodle, data => {
    sn.doodle = data; persist(); renderDetail(sn);
  });
  document.getElementById('share').onclick = () => shareCard(sn);

  if (needsLine) {

      if (cap.isActive()) { cap.stop(); setTimeout(saveLine, 500); } else saveLine();

  const thText = document.getElementById('thText');

      thText.value = (thBase + ' ' + finals + interim).trim();
      thRec.classList.remove('stop');
      thRec.innerHTML = '&#127908; Speak';
    },
    onError: msg => { thRec.classList.remove('stop'); thRec.innerHTML = '&#127908; Speak'; toast(msg); }
  });
  thRec.onclick = () => {
    if (!thLst) { toast('Speech recognition not available — type instead.'); return; }
    if (thLst.active()) { thLst.stop(); return; }
    thBase = thText.value.trim();
    thLst.start();
    thRec.classList.add('stop');
    thRec.innerHTML = '&#9632; Done';
  };

  document.getElementById('thAdd').onclick = () => {
    if (thLst && thLst.active()) thLst.stop();
    const text = thText.value.trim();
    if (!text) { toast('Speak or write a thought first.'); return; }
    const pos = parsePos(document.getElementById('thPos').value);
    sn.thoughts.push({ id: uid(), at: new Date().toISOString(), text, pos });
    persist(); renderDetail(sn);
  };
  sn.thoughts.forEach(th => {
    const b = document.getElementById('thdel-' + th.id);
    if (b) b.onclick = () => {
      if (th.audio) audioDel(th.audio.id);
      sn.thoughts = sn.thoughts.filter(x => x.id !== th.id); persist(); renderDetail(sn);
    };
  });
}
function thoughtHtml(sn, th){

/* ---------- share a snippet as a beautiful card image ---------- */
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
async function shareCard(sn){
  const quote = sn.quote || '';
  const scale = 2, W = 1000, M = 56, P = 48;
  const x = M + P, contentW = W - 2 * M - 2 * P;
  const serif = `'Georgia','Times New Roman',serif`;
  const mc = document.createElement('canvas').getContext('2d');

  // measure drawing
  let img = null, dW = 0, dH = 0, dX = x;
  if (sn.doodle) {
    img = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.onerror = () => res(null); i.src = sn.doodle; });
    if (img) {
      dW = contentW; dH = contentW * img.height / img.width;
      if (dH > 520) { dH = 520; dW = dH * img.width / img.height; dX = x + (contentW - dW) / 2; }
    }
  }
  // measure quote
  const L = quote.length;
  const qFont = L <= 40 ? 52 : L <= 80 ? 44 : L <= 140 ? 36 : L <= 220 ? 30 : 26;
  const lineH = Math.round(qFont * 1.32);
  function wrap(text, font, maxW){
    mc.font = font;
    const out = []; let cur = '';
    for (const w of text.split(/\s+/)) {
      const test = cur ? cur + ' ' + w : w;
      if (mc.measureText(test).width > maxW && cur) { out.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) out.push(cur);
    return out;
  }
  const qLines = quote ? wrap('“' + quote + '”', `${qFont}px ${serif}`, contentW) : [];
  const quoteH = qLines.length * lineH;

  const footerH = 40, gap = 30;
  let inner = 0;
  if (dH) inner += dH + gap;
  if (quoteH) inner += quoteH + gap;
  inner += footerH;
  const cardH = inner + 2 * P, H = cardH + 2 * M;

  const cv = document.createElement('canvas');
  cv.width = W * scale; cv.height = H * scale;
  const ctx = cv.getContext('2d');
  ctx.scale(scale, scale); ctx.textBaseline = 'top';

  ctx.fillStyle = '#F7F3EC'; ctx.fillRect(0, 0, W, H);
  roundRect(ctx, M, M, W - 2 * M, cardH, 28);
  ctx.fillStyle = '#FFFDF9'; ctx.fill();
  ctx.lineWidth = 1.5; ctx.strokeStyle = '#E7E0D4'; ctx.stroke();

  let y = M + P;
  if (dH) {
    roundRect(ctx, dX, y, dW, dH, 16); ctx.save(); ctx.clip();
    ctx.fillStyle = '#fff'; ctx.fillRect(dX, y, dW, dH);
    ctx.drawImage(img, dX, y, dW, dH); ctx.restore();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#E7E0D4'; roundRect(ctx, dX, y, dW, dH, 16); ctx.stroke();
    y += dH + gap;
  }
  if (quoteH) {
    ctx.fillStyle = '#221F1A'; ctx.font = `${qFont}px ${serif}`;
    for (const ln of qLines) { ctx.fillText(ln, x, y); y += lineH; }
    y += gap;
  }
  // footer: source dot + podcast/channel name (left), Moments wordmark (right)
  const srcColor = sn.source === 'youtube' ? '#B33A3A' : sn.source === 'spotify' ? '#3A7D5C' : '#8A8378';
  ctx.beginPath(); ctx.arc(x + 7, y + 11, 7, 0, Math.PI * 2); ctx.fillStyle = srcColor; ctx.fill();
  ctx.fillStyle = '#8A8378'; ctx.font = `22px system-ui,-apple-system,sans-serif`;
  const src = sn.source === 'youtube' ? 'YouTube' : sn.source === 'spotify' ? 'Spotify' : 'Link';
  const label = (sn.podcast || src) + (sn.t != null ? '   ·   ' + fmtTime(sn.t) : '');
  mc.font = '22px system-ui,-apple-system,sans-serif';
  const maxLabelW = contentW - 220;
  let shownLabel = label;
  while (mc.measureText(shownLabel).width > maxLabelW && shownLabel.length > 4) shownLabel = shownLabel.slice(0, -2) + '…';
  ctx.fillText(shownLabel, x + 26, y + 2);
  ctx.textAlign = 'right'; ctx.fillStyle = '#221F1A'; ctx.font = `600 22px ${serif}`;
  ctx.fillText('Moments', W - M - P, y + 2);
  ctx.textAlign = 'left';

  const blob = await new Promise(res => cv.toBlob(res, 'image/png'));
  const file = new File([blob], 'moment.png', { type: 'image/png' });
  const byline = [sn.podcast, sn.title].filter(Boolean).join(' — ');
  const shareText = (quote ? '“' + quote + '”\n' : '') + (byline ? byline + '\n' : '') + (sn.url ? jumpUrl(sn) : '');

  try {
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text: shareText }); return;
    }
    if (navigator.share) { await navigator.share({ text: shareText, url: sn.url || undefined }); return; }
  } catch (e) { if (e && e.name === 'AbortError') return; }
  // fallback (desktop / no Web Share): download the image and copy the text
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'moment.png'; a.click();
  URL.revokeObjectURL(a.href);
  try { await navigator.clipboard.writeText(shareText); toast('Card image saved, caption copied.'); }
  catch (e) { toast('Card image saved.'); }
}

/* ---------- doodle ---------- */
function openDoodle(existing, onDone){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `<div class="sheet">
    <h3>A small drawing</h3>
    <canvas id="doodleCanvas" width="720" height="450"></canvas>
    <div class="row">
      <button class="ghost" id="dUndo">Undo</button>
      <button class="ghost" id="dClear">Clear</button>
      <button class="ghost danger" id="dCancel">Cancel</button>
      <button class="ghost" id="dOk" style="background:var(--ink);color:var(--paper);border-color:var(--ink)">Done</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const cv = ov.querySelector('#doodleCanvas');
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,cv.width,cv.height);
  // fine, single-weight continuous line — minimalist line-art style, not a thick marker
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#221F1A';
  let drew = !!existing;
  if (existing) { const img = new Image(); img.onload = () => ctx.drawImage(img,0,0,cv.width,cv.height); img.src = existing; }
  const undoStack = [];
  let drawing = false;
  let pts = [];
  const pt = e => {
    const r = cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) * cv.width / r.width, y: (e.clientY - r.top) * cv.height / r.height };
  };
  const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
  cv.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (undoStack.length >= 20) undoStack.shift();
    undoStack.push(ctx.getImageData(0,0,cv.width,cv.height));
    drawing = true; drew = true;
    const p = pt(e); pts = [p];
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + .1, p.y + .1); ctx.stroke();
    cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener('pointermove', e => {
    if (!drawing) return;
    pts.push(pt(e));
    const n = pts.length;
    if (n < 3) return;
    // quadratic-through-midpoints smoothing: turns the raw jagged pointer path
    // into one continuous flowing curve, like a fine-line illustration
    const p0 = pts[n - 3], p1 = pts[n - 2], p2 = pts[n - 1];
    const m1 = mid(p0, p1), m2 = mid(p1, p2);
    ctx.beginPath();
    ctx.moveTo(m1.x, m1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, m2.x, m2.y);
    ctx.stroke();
  });
  const stop = () => { drawing = false; pts = []; };
  cv.addEventListener('pointerup', stop); cv.addEventListener('pointercancel', stop);
  ov.querySelector('#dUndo').onclick = () => { const s = undoStack.pop(); if (s) ctx.putImageData(s,0,0); };
  ov.querySelector('#dClear').onclick = () => { ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cv.width,cv.height); undoStack.length = 0; drew = false; };
  ov.querySelector('#dCancel').onclick = () => ov.remove();
  ov.querySelector('#dOk').onclick = () => { onDone(drew ? cv.toDataURL('image/png') : null); ov.remove(); };
}

/* ---------- menu / export / import / install ---------- */
let menuEl = null;
function closeMenu(){ if (menuEl) { menuEl.remove(); menuEl = null; } }
document.getElementById('menuBtn').onclick = e => {
  e.stopPropagation();
  if (menuEl) return closeMenu();
  menuEl = document.createElement('div');
  menuEl.className = 'menu';
  menuEl.innerHTML = `
    <button id="mExport">Export backup (JSON)</button>
    <button id="mImport">Import backup</button>
    ${deferredPrompt ? '<button id="mInstall">Install app</button>' : ''}`;
  document.body.appendChild(menuEl);
  menuEl.querySelector('#mExport').onclick = async () => {
    closeMenu();
    const audio = {};
    for (const sn of db) {
      const ids = [sn.audio && sn.audio.id].concat((sn.thoughts || []).map(t => t.audio && t.audio.id)).filter(Boolean);
      for (const id of ids) {
        const b = await audioGet(id);
        if (b) audio[id] = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(b); });
      }
    }
    const blob = new Blob([JSON.stringify({ format: 'moments/2', snippets: db, audio })], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'moments-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click(); URL.revokeObjectURL(a.href);
  };
  menuEl.querySelector('#mImport').onclick = () => { document.getElementById('importFile').click(); closeMenu(); };
  const mi = menuEl.querySelector('#mInstall');
  if (mi) mi.onclick = () => { deferredPrompt.prompt(); closeMenu(); };
};
document.body.addEventListener('click', e => { if (menuEl && !menuEl.contains(e.target)) closeMenu(); });
document.getElementById('importFile').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = async () => {
    try {
      const data = JSON.parse(rd.result);
      const arr = Array.isArray(data) ? data : (data && Array.isArray(data.snippets) ? data.snippets : null);
      if (!arr) throw new Error('bad');
      const ids = new Set(db.map(x => x.id));
      let added = 0;
      arr.forEach(sn => { if (sn && sn.id && !ids.has(sn.id)) { db.push(sn); added++; } });
      if (data && data.audio) {
        for (const [id, dataUrl] of Object.entries(data.audio)) {
          try { const b = await (await fetch(dataUrl)).blob(); await audioPut(id, b); } catch(e2) {}
        }
      }
      persist(); route(); toast('Imported ' + added + ' snippet' + (added===1?'':'s') + '.');
    } catch(err) { toast('Not a valid backup file.'); }
  };
  rd.readAsText(f);
  e.target.value = '';
};

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; if (!db.length) renderHome(); });
function installBtnHtml(){ return deferredPrompt ? '<button class="ghost" id="installBtn">Install on home screen</button>' : ''; }
function bindInstall(){ const b = document.getElementById('installBtn'); if (b) b.onclick = () => deferredPrompt.prompt(); }

/* ---------- boot ---------- */
if ('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
consumePendingShare();
route();
</script>
